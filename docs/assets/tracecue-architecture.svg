<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TraceCue Agent Architecture</title>
  <desc id="desc">Public WorkCue Open and Qwen Cloud reference architecture for source-grounded equipment after-sales QR guides.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #ffffff; stroke: #cdd7e5; stroke-width: 2; }
      .panel-soft { fill: #f9fbfd; stroke: #d8e2ee; stroke-width: 1.5; }
      .node-source { fill: #edf7f4; stroke: #58a998; stroke-width: 2; }
      .node-app { fill: #eef4ff; stroke: #5e7fbf; stroke-width: 2; }
      .node-qwen { fill: #fff5e8; stroke: #d48b30; stroke-width: 2; }
      .node-standby { fill: #f3f1fb; stroke: #8d78c4; stroke-width: 2; }
      .node-guard { fill: #fff9e8; stroke: #c59b20; stroke-width: 2; }
      .node-risk { fill: #fff1f0; stroke: #c46a5c; stroke-width: 2; }
      .node-review { fill: #f7f7f7; stroke: #7b8494; stroke-width: 2; }
      .node-ledger { fill: #ecf8ff; stroke: #3a8fb7; stroke-width: 2; }
      .node-gate { fill: #effaf0; stroke: #4c9b55; stroke-width: 2; }
      .node-output { fill: #ffffff; stroke: #5f6f86; stroke-width: 2; }
      .withheld { fill: #fff7f7; stroke: #c75146; stroke-width: 2; stroke-dasharray: 8 6; }
      .arrow { fill: none; stroke: #34445a; stroke-width: 3; marker-end: url(#arrowHead); }
      .arrow-soft { fill: none; stroke: #667891; stroke-width: 2.4; marker-end: url(#arrowHeadSoft); }
      .arrow-qwen { fill: none; stroke: #b97018; stroke-width: 3; marker-end: url(#arrowHeadQwen); }
      .arrow-block { fill: none; stroke: #c75146; stroke-width: 3; marker-end: url(#arrowHeadBlock); stroke-dasharray: 9 7; }
      .title { fill: #162238; font-family: Arial, Helvetica, sans-serif; font-size: 42px; font-weight: 800; }
      .subtitle { fill: #536276; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 500; }
      .section { fill: #506176; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 1px; }
      .node-title { fill: #172236; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 800; }
      .node-title-small { fill: #172236; font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 800; }
      .node-text { fill: #41516a; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 500; }
      .node-text-small { fill: #41516a; font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 500; }
      .label { fill: #253247; font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; }
      .pill { fill: #e9eef6; stroke: #c7d1df; stroke-width: 1; }
      .pill-text { fill: #36465f; font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; }
      .banner { fill: #142033; }
      .banner-text { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; }
